<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Margin Property</title>
    <style>
        *{
            margin: 0;
            padding: 0; 
        }
       .pad{
        height: 50px;
        width: 50px;
        padding: 2px;
       }
       #one{
        background-color: aqua;
        margin: 5px ;
       }
       #two{
        background-color: red;
        margin: 5px ;
       }
    </style>
</head>
<body>
    <div id="one" class="pad">First</div>
    <div id="two" class="pad">Second</div>
</body>
</html>
