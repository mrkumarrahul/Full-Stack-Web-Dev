<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Border Property</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }
       #one{
            height: 50px;
            width: 50px;
            background-color: blue;
            padding: 10px;
            margin: 10px;
            border: 5px dashed red;
            border-radius: 1px;
       }
    </style>
</head>
<body>
    <div class="border" id="one">My Div</div>
</body>
</html>
