<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text-Transform Property</title>
    <style>
        #box1{
            text-transform: uppercase;
        }
        #box2{
            text-transform: lowercase;
        }
        #box3{
            text-transform: none;
        }
        #box4{
            text-transform: capitalize;
        }
    </style>
</head>
<body>
    <h3 class="box" id="box1">Box 1</h3>
    <h3 class="box" id="box2">Box 2</h3>
    <h3 class="box" id="box3">Box 3</h3>
    <h3 class="box" id="box4">box 4</h3>
</body>
</html>
