<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text-align</title>
    <style>
       .box{
        height: 100px;
        width: 100px;
       }
       #box1{
        background-color: red;
        text-align: left;
       }
       #box2{
        background-color: blue;
        text-align: right;
       }
       #box3{
        background-color: violet;
        text-align:end;
       }
       #box4{
        background-color: greenyellow;
        text-align: center;
       }
       
    </style>
</head>
<body>
    <h2 class="box" id="box1">Box</h2>
    <h2 class="box" id="box2">Box</h2>
    <h2 class="box" id="box3">Box</h2>
    <h2 class="box" id="box4">Box</h2>
</body>
</html>
